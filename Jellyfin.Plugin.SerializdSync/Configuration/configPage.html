<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>SerializdSync</title>
</head>
<body>
    <div id="serializdSyncConfigPage" data-role="page" class="page type-interior pluginConfigurationPage" data-require="emby-input,emby-button,emby-select,emby-checkbox">
        <div data-role="content">
            <div class="content-primary">
                <h1>Serializd Sync</h1>
                <form id="serializdSyncConfigForm">
                    <div class="selectContainer">
                        <label class="selectLabel" for="selectUser">Configure Serializd for:</label>
                        <select is="emby-select" id="selectUser" name="selectUser" class="emby-select-withcolor emby-select">
                        </select>
                    </div>

                    <div class="verticalSection">
                        <h2>Serializd Credentials</h2>
                        <p class="fieldDescription">Enter the Serializd account credentials for this Jellyfin user.</p>

                        <div class="inputContainer">
                            <label class="inputLabel inputLabelUnfocused" for="serializdUsername">Serializd Username</label>
                            <input id="serializdUsername" name="serializdUsername" type="text" is="emby-input" />
                            <div class="fieldDescription">The username for the Serializd account.</div>
                        </div>

                        <div class="inputContainer">
                            <label class="inputLabel inputLabelUnfocused" for="serializdPassword">Serializd Password</label>
                            <input id="serializdPassword" name="serializdPassword" type="password" is="emby-input" />
                            <div class="fieldDescription">The password for the Serializd account.</div>
                        </div>

                        <div id="credentialsStatus" class="fieldDescription" style="margin-top: 1em;">
                        </div>
                    </div>

                    <div>
                        <button is="emby-button" type="submit" class="raised button-submit block emby-button">
                            <span>Save</span>
                        </button>
                    </div>
                </form>
            </div>
        </div>
        <script type="text/javascript">
            var SerializdSyncConfig = {
                pluginUniqueId: '6616e553-2549-4e36-abe2-0678676fd506',

                loadConfiguration: function(userId, page) {
                    Dashboard.showLoadingMsg();
                    ApiClient.getPluginConfiguration(SerializdSyncConfig.pluginUniqueId).then(function (config) {
                        let currentUserConfig = config.SerializdUsers.filter(function (curr) {
                            return curr.LinkedMbUserId == userId;
                        })[0];

                        // User doesn't have a config yet, create default
                        if (!currentUserConfig) {
                            currentUserConfig = {
                                LinkedMbUserId: userId,
                                SerializdUsername: '',
                                SerializdPassword: ''
                            };
                        }

                        page.querySelector('#serializdUsername').value = currentUserConfig.SerializdUsername || '';
                        page.querySelector('#serializdPassword').value = currentUserConfig.SerializdPassword || '';

                        // Update status display
                        var statusEl = page.querySelector('#credentialsStatus');
                        if (currentUserConfig.SerializdUsername && currentUserConfig.SerializdPassword) {
                            statusEl.innerHTML = '<span style="color: green;">&#10003; Credentials configured for this user.</span>';
                        } else {
                            statusEl.innerHTML = '<span style="color: orange;">&#9888; No credentials configured for this user.</span>';
                        }

                        Dashboard.hideLoadingMsg();
                    });
                },

                populateUsers: function(users) {
                    var html = '';
                    for (var i = 0; i < users.length; i++) {
                        var user = users[i];
                        html += '<option value="' + user.Id + '">' + user.Name + '</option>';
                    }
                    document.querySelector('#selectUser').innerHTML = html;
                },

                save: function(page) {
                    Dashboard.showLoadingMsg();
                    var currentUserId = page.querySelector('#selectUser').value;

                    ApiClient.getPluginConfiguration(SerializdSyncConfig.pluginUniqueId).then(function (config) {
                        var currentUserConfig = config.SerializdUsers.filter(function (curr) {
                            return curr.LinkedMbUserId == currentUserId;
                        })[0];

                        // User doesn't have a config, create one
                        if (!currentUserConfig) {
                            currentUserConfig = {
                                LinkedMbUserId: currentUserId
                            };
                            config.SerializdUsers.push(currentUserConfig);
                        }

                        currentUserConfig.SerializdUsername = page.querySelector('#serializdUsername').value;
                        currentUserConfig.SerializdPassword = page.querySelector('#serializdPassword').value;

                        ApiClient.updatePluginConfiguration(SerializdSyncConfig.pluginUniqueId, config).then(function (result) {
                            Dashboard.processPluginConfigurationUpdateResult(result);
                            SerializdSyncConfig.loadConfiguration(currentUserId, page);
                        });
                    });
                }
            };

            document.querySelector('#serializdSyncConfigPage')
                .addEventListener('pageshow', function() {
                    var page = this;
                    ApiClient.getUsers().then(function (users) {
                        SerializdSyncConfig.populateUsers(users);
                        var currentUserId = page.querySelector('#selectUser').value;
                        if (currentUserId) {
                            SerializdSyncConfig.loadConfiguration(currentUserId, page);
                        }
                    });
                });

            document.querySelector('#selectUser')
                .addEventListener('change', function() {
                    var page = document.querySelector('#serializdSyncConfigPage');
                    SerializdSyncConfig.loadConfiguration(this.value, page);
                });

            document.querySelector('#serializdSyncConfigForm')
                .addEventListener('submit', function(e) {
                    var page = document.querySelector('#serializdSyncConfigPage');
                    SerializdSyncConfig.save(page);
                    e.preventDefault();
                    return false;
                });
        </script>
    </div>
</body>
</html>
